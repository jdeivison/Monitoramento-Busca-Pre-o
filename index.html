<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Monitoramento Busca Preço</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="theme-toggle-container">
      <button onclick="toggleTheme()" id="themeBtn">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>

    <audio
      id="alertSound"
      src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
    ></audio>

    <div class="header-section" style="text-align: center">
      <h1>
        <i
          class="fa-solid fa-satellite-dish"
          style="color: var(--accent-blue)"
        ></i>
        Monitoramento Busca Preço
      </h1>
      <p
        id="update-timer"
        style="color: var(--text-dim); font-size: 0.9em; margin-bottom: 30px"
      >
        Iniciando ativos...
      </p>
    </div>

    <div class="controls">
      <div style="display: flex; gap: 15px; align-items: center">
        <i class="fa-solid fa-filter" style="color: var(--text-dim)"></i>
        <select id="filtroStatus" onchange="renderizar()">
          <option value="todos">Todos Dispositivos</option>
          <option value="online">Online</option>
          <option value="offline">Offline</option>
        </select>
      </div>

      <div style="display: flex; gap: 10px">
        <button class="btn-save" onclick="salvarNoNavegador()">
          <i class="fa-solid fa-floppy-disk"></i> Salvar Layout
        </button>
        <button onclick="resetarEstatisticas()">
          <i class="fa-solid fa-rotate"></i> Resetar Métricas
        </button>
      </div>

      <div
        id="global-stats"
        style="font-weight: 600; font-size: 0.9em; letter-spacing: 1px"
      ></div>
    </div>

    <div class="container" id="painel"></div>

    <footer class="developer-footer">
      <p>
        Todos os direitos reservados. Desenvolvido por:
        <span>Deivison Silva</span>
      </p>
    </footer>

    <div id="modal-backdrop" class="modal-backdrop" style="display: none;"></div>
    <div id="modal" class="modal" style="display: none;">
        <div id="modal-title" class="modal-title"></div>
        <div id="modal-body" class="modal-body"></div>
        <div id="modal-footer" class="modal-footer"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
